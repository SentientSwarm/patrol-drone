# mission_basic.yaml (02-owned) — minimal basic-mission params (MC-1, design Appendix C.2).
# No waypoints: arm -> takeoff to takeoff_alt_m -> hover hover_time_s -> RTH (home) -> land.
# home is at the xy origin (directly below takeoff), so RTH is an in-place descent before land.
takeoff_alt_m: 5.0
hover_time_s: 10.0
completion: { tolerance_m: 0.5, hold_time_s: 2.0 }   # OQ-4 defaults (overridable)
abort: { low_battery_threshold: 0.20 }               # OQ-6 (battery_status.remaining fraction)
home: { position: { x: 0.0, y: 0.0, z: 2.0 }, frame: "enu" }
waypoints: []
