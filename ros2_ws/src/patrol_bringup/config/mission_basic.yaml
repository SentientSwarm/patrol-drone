# mission_basic.yaml (02-owned) — minimal basic-mission params (MC-1, design Appendix C.2).
# No waypoints: arm -> takeoff to takeoff_alt_m -> hover hover_time_s -> RTH -> land.
# M4 generalized HOVER so a no-waypoint mission routes HOVER -> RTH (design §4.2.3 table): the basic
# mission now returns to the home waypoint and lands there, rather than landing in place. Home sits
# at 2 m ENU (matching design Appendix C.2) so RTH settles at 2 m AGL and PX4's land controller
# handles the final descent — cleaner than descending to the ground plane under offboard.
takeoff_alt_m: 5.0
hover_time_s: 10.0
completion: { tolerance_m: 0.5, hold_time_s: 2.0 }   # OQ-4 defaults (overridable)
abort: { low_battery_threshold: 0.20 }               # OQ-6 (battery_status.remaining fraction)
home: { position: { x: 0.0, y: 0.0, z: 2.0 }, frame: "enu" }
waypoints: []
