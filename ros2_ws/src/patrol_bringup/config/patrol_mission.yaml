# patrol_mission.yaml (02-owned) — the full patrol route (MC-3, design Appendix C.2).
#
# Flown by `ros2 launch patrol_bringup mission_patrol.launch.py`: arm -> takeoff to takeoff_alt_m
# -> hover hover_time_s -> visit each waypoint in order (tolerance+hold, then dwell_s) -> RTH via
# the explicit home-waypoint offboard sequence -> land. No route data is hardcoded in source.
#
# Every waypoint carries a frame (directly via `frame`, or implicitly ENU via a `checkpoint_id`
# reference resolved against sim/config/checkpoints.yaml) so the single MC-7 conversion boundary
# always knows the source frame. The first three waypoints reference 03's canonical checkpoints
# (cp_north/cp_east/cp_south, so the patrol visits each AprilTag in turn — M5 SIM-5/AC-3); the last
# is an inline ENU overlook, kept to exercise the inline-waypoint path alongside checkpoint refs.
takeoff_alt_m: 5.0
hover_time_s: 10.0
completion:
  tolerance_m: 0.5      # OQ-4 default (overridable)
  hold_time_s: 2.0      # OQ-4 default (overridable)
abort:
  low_battery_threshold: 0.20   # OQ-6 (battery_status.remaining fraction)
# Approach geometry (SIM-4): each checkpoint waypoint hovers `standoff_m` back from the tag and yaws to
# face it, so the forward camera resolves the marker rather than sitting on top of it. The world's
# AprilTags are emitted at zero yaw (face normal along +Y), so the stand-off is taken along +Y.
approach:
  standoff_m: 3.0   # meters; tunable — see tests/unit/test_checkpoint_visibility.py
# Home at 2 m ENU altitude: RTH flies the explicit home-waypoint setpoint to here, settles, then
# LANDING descends the rest of the way (OQ-8 — no PX4 RTL handoff).
home:
  position: { x: 0.0, y: 0.0, z: 2.0 }
  frame: "enu"
waypoints:
  # dwell_s lengthened to 6 s so the drone parks long enough for the camera to settle on the tag and
  # apriltag to produce a detection that is still fresh when /patrol/dwell fires (capture timing fix).
  - checkpoint_id: "cp_north"   # resolved from sim/config/checkpoints.yaml (ENU)
    dwell_s: 6.0
  - checkpoint_id: "cp_east"
    dwell_s: 6.0
  - checkpoint_id: "cp_south"
    dwell_s: 6.0
  - position: { x: 5.0, y: 5.0, z: 2.5 }   # inline ENU overlook (clear of obstacles); exercises the inline path
    frame: "enu"
    dwell_s: 6.0
