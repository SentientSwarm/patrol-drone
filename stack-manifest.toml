# stack-manifest.toml — the canonical pinned stack manifest (PLAT-7 / AC-8).
#
# Single source of truth for every toolchain layer's version. The README bring-up
# path, the Dockerfiles (docker/sim, docker/dev), and docker-compose cite this and
# pull values via .env / build ARGs — no version literal is duplicated anywhere
# else. CLAUDE.md's "Stack (pinned)" table is a human-facing summary of this file
# and must be kept in sync (see ADR-0004).
#
# Status: FINAL as of M2 (T2.7 / SWM-11). OQ-3 RESOLVED — the px4_version / px4_msgs_ref
# pair is no longer provisional: the M1–M2 integration spike confirmed v1.17.0 ↔ release/1.17
# as a known-good combination. Evidence: PX4 v1.17.0 (at px4_commit) installed on the host;
# px4_msgs release/1.17 + px4_ros_com vendored and built green by a single `colcon build`
# (all 4 workspace packages); live /fmu/* bridge proven against gz_x500 SITL. The
# px4_version / px4_msgs_ref pair remains the single edit point should the pin ever move.
# Design reference: docs/phase1/01-platform/design.md §4.2.9 (C9); OQ-3 tracked in MZ / §6.5.

[os]
ubuntu        = "24.04"                      # Noble Numbat (ADR-0001)

[middleware]
ros_distro    = "jazzy"                       # ROS 2 Jazzy Jalisco (LTS; ADR-0001)
python        = "3.12"                         # Ubuntu 24.04 default interpreter

[ros_apt_source]
# The ros-infrastructure/ros-apt-source .deb that drops in the ROS 2 apt signing key + repo
# list. Pinned (not `latest`) and SHA256-verified before the root apt install (ADR-0006).
# sha256 is for the noble (24.04) `_all` asset; bump version + sha256 together.
version = "1.2.0"
sha256  = "0804d9b13db770eb87019be414cd78378835228ad5fa801fc88758596dd8f7e5"

[flight_stack]
px4_version   = "v1.17.0"                      # ← OQ-3 edit point (FINAL). Latest stable; proven by M2.
px4_commit    = "d6f12ad1c4f70ad3230afd7d86e971421e02fef4"  # commit the v1.17.0 tag dereferences to;
                                               #   setup_phase1.sh + docker/sim/Dockerfile verify HEAD matches this.
px4_msgs_ref  = "release/1.17"                 # ← OQ-3 edit point (FINAL). Matches px4_version's release
                                               #   line (release/1.17 ↔ v1.17.0); built green at M2.
# Exact commits of the vendored copies under ros2_ws/src/external/ (committed, not fetched at
# build time — design C6/H3). Recorded for reproducibility; bump alongside px4_msgs_ref.
px4_msgs_commit    = "86d8239e962f6939e05c3737784f60c02fa884db"  # px4_msgs @ release/1.17
px4_ros_com_commit = "86e9aeb20e55a4673fa8a9f1c29ea06a6c5ad1af"  # px4_ros_com @ main (no release/1.17
                                               #   branch cut upstream; main == release/1.16 at this commit)
# Deterministic content fingerprint of each vendored subtree: sha256 of `git ls-files -s <path>`
# (file mode + git blob SHA + path per tracked file). The drift checker (check_vendor_provenance)
# recomputes and compares — so any local edit to the committed upstream copies trips CI offline,
# enforcing the recorded provenance the *_commit pins above only document (Hermes Medium #5).
# Regenerate alongside a deliberate px4_msgs_ref bump: git ls-files -s <path> | sha256sum.
px4_msgs_tree_sha    = "71bb476465ab0519a9bfcef4b5cd0ccd35e1e63e0f5fbff2f9b7e2a4f8d9d252"
px4_ros_com_tree_sha = "3dd5271afe558fb7ab176094d407005e5854374ce25d3379260a162699064a13"

[simulator]
gazebo        = "harmonic"                     # gz-sim 8.x (host patch version tracked in CLAUDE.md)

[bridge]
# Micro XRCE-DDS Agent — the native PX4<->ROS 2 bridge (NOT MAVROS). M2 integration-spike
# finding (ADR-0007): there is NO `ros-${ROS_DISTRO}-micro-xrce-dds-agent` apt package in the
# ROS 2 Jazzy repo (verified on the host and in the osrf/ros:jazzy-desktop base). The agent is
# built FROM SOURCE at a pinned eProsima tag — the PX4-canonical method. The sim container
# (docker/sim/Dockerfile) and setup_phase1.sh both build this exact tag; both produce the
# `MicroXRCEAgent` binary used by the bridge (`MicroXRCEAgent udp4 -p 8888`).
uxrce_dds_agent_source  = "https://github.com/eProsima/Micro-XRCE-DDS-Agent.git"
uxrce_dds_agent_version = "v3.0.1"
uxrce_dds_agent_commit  = "155cfaaf8b7abac2e85d4a62d3649b09ace0be55"  # tag v3.0.1 dereferences here

# Transitive deps the agent's CMake SUPERBUILD fetches, builds, and installs into /usr/local
# (their .so files ship in the image). The agent commit above references these via the refs below
# in cmake/SuperBuild.cmake + CMakeLists.txt. Pinned by COMMIT and verified post-fetch by
# build_xrce_agent.sh (Hermes Medium #3) so a moved/compromised upstream ref cannot silently change
# installed code. NB: Fast-CDR `2.2.x` and Fast-DDS `3.x` are MOVING BRANCHES upstream — the commit
# pin is the tripwire: when eProsima advances the branch the build fails loudly and a human
# re-resolves (`git ls-remote <repo> <ref>`) and bumps the commit here. The refs/commits are tied to
# uxrce_dds_agent_version; re-capture all four when that pin moves.
uxrce_fastcdr_ref             = "2.2.x"     # branch (moves)
uxrce_fastcdr_commit          = "9821b82dea52b9393155daf9b5f1d5c125e7db46"
uxrce_fastdds_ref             = "3.x"       # branch (moves)
uxrce_fastdds_commit          = "dff5a82fd74b95befe8b4dddd75f1a8830cdbf07"
uxrce_foonathan_memory_ref    = "v0.7-3"    # tag
uxrce_foonathan_memory_commit = "0f0775770fd1c506fa9c5ad566bd6ba59659db66"
uxrce_spdlog_ref              = "v1.9.2"    # tag
uxrce_spdlog_commit           = "eb3220622e73a4889eee355ffa37972b3cac3df5"

[bags]
mcap_plugin   = "rosbag2-storage-mcap"         # rosbag2 MCAP storage plugin (05 records; sqlite is legacy)

[build]
colcon        = "pinned"                        # python3-colcon-common-extensions (ROS 2 Jazzy apt)
docker        = "pinned"                        # Docker Engine + Compose v2

[container]
ros_base_image  = "osrf/ros:jazzy-desktop"      # shared base for the sim/dev containers (C1/C2)
ros_base_digest = "sha256:2ce9a0e3e9abd4dd804cd044d279f411d31074f165670e010dfdb4e096404716"
                                                #   pin the base by digest for reproducibility — the consumed
                                                #   reference is ros_base_image@ros_base_digest (gen_build_args.py).

[tools]
uv_version         = "0.11.18"                  # Python manager
uv_tarball_sha256  = "588f3e360f69ce02b6982aa99f2240e803933a6b7e176ac01617830adf955add"
                                                #   sha256 of the GitHub release artifact
                                                #   uv-x86_64-unknown-linux-gnu.tar.gz (verified before
                                                #   extraction; no `curl | sh` remote-exec — ADR-0006).

[apps]
# Desktop apps are pinned to explicit releases (not `latest`) and checksum-verified after download
# (setup_phase1.sh::verify_sha256). Bump version+sha256 together; the URL derives from the version.
qgc_version       = "v5.0.8"
qgc_sha256        = "06969c67ef58ea063def0a8271447a1cc385438c4a7df36813315b4475146737"
qgc_url           = "https://github.com/mavlink/qgroundcontrol/releases/download/v5.0.8/QGroundControl-x86_64.AppImage"
foxglove_version  = "2.54.0"
foxglove_sha256   = "00d3956a060116032ca842d3706302a9220e1a799b0d6fc63abfd617e1e8910c"
foxglove_url      = "https://get.foxglove.dev/desktop/v2.54.0/foxglove-studio-2.54.0-linux-amd64.deb"
