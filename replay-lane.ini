# Pytest config for the CI `replay-regression` lane only (.github/workflows/replay-regression.yml).
#
# Why a separate file (not pyproject.toml): the setup-ros-docker image ships system pytest ~7.4 with
# rclpy/numpy on its path, but pyproject pins `minversion=9.0` (a guard, not a runtime need) — pytest
# 7.4 runs these tests fine. `-c replay-lane.ini` bypasses that minversion gate.
#
# Why repo root (NOT tests/replay/): pytest derives `rootdir` from this file's directory, and the
# `pythonpath` entries below are resolved relative to rootdir. At the repo root they resolve to the
# real tests/replay, analysis, docker dirs; anywhere else they don't (that /tmp relocation was the
# M8 replay-lane bug — see PR #16). This file is checked in so it is reviewable and drift-visible
# like the rest of CI, unlike the previous runtime-heredoc'd /tmp config.
[pytest]
markers =
    ros: replay/stand-in test (needs a sourced ROS env)
pythonpath =
    tests/replay
    analysis
    docker
